<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Create Product</h2>

<form th:action="@{/products/save}" method="post" th:object="${product}">

    <div class="mb-3">
        <label>Name</label>
        <input type="text" th:field="*{name}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Price</label>
        <input type="number" th:field="*{price}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Image (vd: laptop.jpg)</label>
        <input type="text" th:field="*{image}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Category ID</label>
        <input type="number" th:field="*{category.id}" class="form-control">
    </div>

    <button class="btn btn-success">Save</button>
    <a th:href="@{/products}" class="btn btn-secondary">Back</a>

</form>

</body>
</html>
