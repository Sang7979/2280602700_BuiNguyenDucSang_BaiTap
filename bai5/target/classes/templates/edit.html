<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h3>Edit Product</h3>

    <form th:action="@{/products/update}" th:object="${product}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label>Name</label>
            <input type="text" class="form-control" th:field="*{name}">
        </div>

        <div class="mb-3">
            <label>Price</label>
            <input type="number" class="form-control" th:field="*{price}">
        </div>

        <div class="mb-3">
            <label>Image URL</label>
            <input type="text" class="form-control" th:field="*{image}">
        </div>

        <div class="mb-3">
            <label>Category ID</label>
            <input type="number" class="form-control" th:field="*{category.id}">
        </div>

        <button class="btn btn-success">Update</button>

        <a th:href="@{/products}" class="btn btn-secondary">Back</a>

    </form>

</div>

</body>
</html>
